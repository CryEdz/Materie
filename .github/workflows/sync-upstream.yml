name: Sync Fork With Upstream

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git identity
        run: |
          git config user.email "CryEdz@users.noreply.github.com"
          git config user.name "CryEdz"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/edoardoquerio-pixel/Materie.git
          git fetch upstream

      - name: Merge upstream changes
        run: |
          git merge upstream/main --no-edit || true

      - name: Push changes to fork
        run: |
          git push origin main
